<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
text-align:center;
}

/* fond */

canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* texte */

#text{
font-size:32px;
max-width:600px;
min-height:100px;
opacity:0;
animation:fadeIn 2s forwards;

position:relative;
z-index:2;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* boutons */

.buttons{
margin-top:40px;
display:none;
z-index:2;
position:relative;
}

button{
padding:15px 40px;
margin:10px;
border:none;
border-radius:30px;
background:#ff2a8b;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px #ff2a8b;
}

/* coeur */

.heart{
font-size:70px;
margin-top:30px;
display:none;
animation:beat 1.2s infinite;
position:relative;
z-index:2;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div id="text"></div>

<div class="buttons" id="buttons">
<button onclick="yes()">Oui ❤️</button>
<button onclick="no()" onmouseover="almost()" id="noBtn">Non ❌</button>
</div>

<div class="heart" id="heart">❤️</div>

<script>

/* texte animé */

const message = "Veux-tu continuer cette histoire avec moi ? ❤️";
let i = 0;

function typeWriter(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter,50);
}else{
document.getElementById("buttons").style.display = "block";
}
}

typeWriter();

/* bouton OUI */

function yes(){
document.getElementById("text").innerHTML = "YES ❤️";
document.getElementById("buttons").style.display = "none";
document.getElementById("heart").style.display = "block";
}

/* bouton NON (impossible 😈) */
function almost(){
let btn = document.getElementById("noBtn");
btn.innerHTML = "tu peux pas 😈";
}

/* fond LOVE */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "LOVE";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#ff2a8b";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){

const text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
